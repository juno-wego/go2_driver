/**
 * go2_driver_node default parameters
 * Loaded automatically by go2_bringup.launch.py
 */
go2_driver_node:
  ros__parameters:
    # Network interface for DDS (empty = auto-detect)
    # Example: "eth0", "wlan0", "enp3s0"
    network_interface: ""

    # Use unitree_sdk2_python DDS mode (true) or ROS2-only bridge mode (false)
    use_sdk_mode: true

    # Publish odom → base_link TF
    publish_tf: true

    # Frame IDs
    odom_frame: "odom"
    base_frame: "base_link"

    # /cmd_vel watchdog timeout (seconds)
    # If no /cmd_vel received within this time, robot stops
    cmd_vel_timeout: 0.5
